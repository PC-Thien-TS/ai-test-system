name: pytest-lark

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  pytest-with-lark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements/dev.txt ]; then pip install -r requirements/dev.txt; fi

      - name: Run full QA pipeline
        id: full_pipeline
        continue-on-error: true
        env:
          LARK_ENABLED: ${{ vars.LARK_ENABLED || 'false' }}
          LARK_DRY_RUN: ${{ vars.LARK_DRY_RUN || 'true' }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          PROJECT_NAME: rankmate
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: |
          python scripts/run_full_pipeline.py --project rankmate

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-lark-artifacts
          path: |
            artifacts/pytest/
            artifacts/failure_analysis/
            artifacts/failure_memory/
            artifacts/decision/
            artifacts/self_healing/
            artifacts/dashboard/
            artifacts/pipeline/
          if-no-files-found: warn

      - name: Gate on QA decision
        if: always()
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("artifacts/decision/decision_result.json")
          if not path.exists():
              print("QA decision artifact missing: artifacts/decision/decision_result.json")
              sys.exit(1)

          payload = json.loads(path.read_text(encoding="utf-8"))
          decision = payload.get("decision", "UNKNOWN")
          release_action = payload.get("release_action", "UNKNOWN")
          confidence = payload.get("confidence", "UNKNOWN")

          print(f"QA decision: {decision}")
          print(f"Release action: {release_action}")
          print(f"Confidence: {confidence}")

          if decision == "BLOCK_RELEASE":
              print("Decision gate failed: BLOCK_RELEASE")
              sys.exit(1)

          print("Decision gate passed.")
          PY

          if [ "${{ steps.full_pipeline.outcome }}" = "failure" ]; then
            echo "Full pipeline exited non-zero, but decision gate did not block release."
          fi
