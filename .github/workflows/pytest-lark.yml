name: pytest-lark

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'rankmate' }}
      LARK_ENABLED: ${{ vars.LARK_ENABLED || 'true' }}
      LARK_DRY_RUN: ${{ vars.LARK_DRY_RUN || 'true' }}
      LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
      DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-json-report
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Run pytest with JSON report
        id: pytest_run
        continue-on-error: true
        run: |
          python scripts/run_pytest_with_report.py

      - name: Notify Lark from pytest report
        if: always()
        run: |
          python scripts/notify_lark_from_pytest.py

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts
          path: artifacts/pytest/
          if-no-files-found: warn

      - name: Fail workflow if pytest failed
        if: steps.pytest_run.outcome == 'failure'
        run: exit 1

