name: pytest-lark

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

jobs:
  pytest-with-lark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements/dev.txt ]; then pip install -r requirements/dev.txt; fi

      - name: Run pytest and build report
        id: pytest_run
        continue-on-error: true
        run: |
          python scripts/run_pytest_with_report.py

      - name: Analyze + notify Lark
        if: always()
        env:
          LARK_ENABLED: ${{ vars.LARK_ENABLED || 'false' }}
          LARK_DRY_RUN: ${{ vars.LARK_DRY_RUN || 'true' }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME || github.repository }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: |
          python scripts/notify_lark_from_pytest.py

      - name: Upload pytest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-lark-artifacts
          path: |
            artifacts/pytest/
            artifacts/failure_analysis/
          if-no-files-found: warn

      - name: Enforce pytest result
        if: always()
        run: |
          if [ "${{ steps.pytest_run.outcome }}" = "failure" ]; then
            exit 1
          fi

