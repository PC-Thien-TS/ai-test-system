defaults:
  embedding_model_name: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  embedding_local_path: null
  local_files_only: true
  chunk_size_chars: 1200
  chunk_overlap_chars: 200
  index_backend: auto
  default_top_k: 6
  max_pack_chars: 8000

domains:
  didaunao_release_audit:
    top_k_per_step:
      "01": 8
      "02": 8
      "03": 8
      "04": 6
      "05": 6
      "06": 8
    step_queries:
      "01":
        - "release audit stages self inspection lifecycle go no-go precheck qa security observability rollback"
        - "mandatory release gates UX UI commercial pass performance crash ANR security API SLA monitoring"
        - "unknown ambiguous release criteria exception handling didaunao"
      "02":
        - "allowed disallowed release transitions gate criteria owner responsibility rollback readiness"
        - "release audit blocking conditions severity thresholds crash ANR p95 SLA security OWASP"
      "03":
        - "UX UI commercial pass performance metrics crash ANR security OWASP API p95 SLA monitoring observability rollback data quality search relevance"
        - "mandatory pre-release validation alerts dashboards audit logs rollback rehearsal data correctness release audit"
        - "negative cases threshold breach missing evidence failed monitoring crash rate ANR p95 regression"
      "04":
        - "high risk release audit gaps false pass missing evidence threshold breach rollback unavailable observability blind spots"
        - "security performance crash ANR data quality search relevance release readiness edge cases"
      "05":
        - "release audit regression smoke mandatory gates critical go no-go checks rollback monitoring security performance"
        - "P0 release blockers crash ANR API SLA observability data quality search relevance"
      "06":
        - "release checklist go no-go mandatory checks rollback monitoring dashboards alerts incident response"
        - "optimization plan performance security observability data quality search relevance release audit"
  store_verify:
    top_k_per_step:
      "01": 8
      "02": 6
      "03": 8
      "04": 5
      "05": 5
      "06": 6
    step_queries:
      "01":
        - "store verification states statuses transitions approve reject resubmit pending review verified"
        - "actors who can approve reject submit resubmit store verification"
        - "unknown ambiguous transition rules store verification"
      "02":
        - "allowed disallowed transitions guards actors actions store verification"
        - "approve reject resubmit invalid transitions verification workflow"
      "03":
        - "store verification API endpoints required documents validation permissions duplicate submit idempotency"
        - "approve reject resubmit timeout SLA invalid transitions store verification"
        - "critical edge cases manual review missing documents status mismatch"
      "04":
        - "high risk store verification edge cases approve reject resubmit permissions invalid transitions"
        - "missing documents duplicate submissions manual review audit logging"
      "05":
        - "high risk store verification regression smoke approve reject resubmit permissions"
        - "critical path status transitions errors and negative flows store verification"
      "06":
        - "store verification smoke checklist regression checklist release monitoring audit logs rollback"
        - "approval rejection resubmission operational checks alerts dashboards"
